<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>冰晶工作台 - 水晶侧轨</title>
  <style>
    :root { color: #253f58; font-family: "PingFang SC", "Hiragino Sans GB", sans-serif; }
    * { box-sizing: border-box; } body { margin: 0; min-width: 320px; min-height: 100vh; background: #dcecf5; }
    .app { min-height: 100vh; display: grid; grid-template-columns: 236px 1fr; grid-template-rows: 48px 1fr; overflow: hidden; background: radial-gradient(circle at 88% 6%, #f9ffffbb, transparent 23%), radial-gradient(circle at 54% 96%, #a6d8f45c, transparent 32%), linear-gradient(135deg,#eff8fc,#cfe3ef); }
    .titlebar { grid-column: 1/-1; display: flex; align-items: center; padding-left: 88px; border-bottom: 1px solid #ffffff91; background: #ffffff47; backdrop-filter: blur(24px) saturate(130%); color: #698299; font-size: 13px; font-weight: 600; letter-spacing: .02em; }
    aside { padding: 26px 14px; border-right: 1px solid #fff9; background: #ffffff3d; backdrop-filter: blur(26px) saturate(135%); }
    .brand { display: flex; gap: 11px; align-items: center; margin: 0 10px 29px; } .mark { display: grid; place-items: center; width: 34px; height: 34px; border-radius: 11px; background: #ffffff8a; box-shadow: inset 0 1px #fff, 0 7px 18px #6e98b526; color: #4986ad; font-size: 13px; font-weight: 800; } .brand b { font-size: 17px; } .brand small { display: block; margin-top: 3px; color: #829bad; font-size: 11px; }
    nav { display: grid; gap: 5px; } nav button { display: grid; grid-template-columns: 25px 1fr; gap: 9px; align-items: center; padding: 11px 12px; border: 0; border-radius: 12px; background: transparent; color: #5d778e; text-align: left; font: inherit; cursor: pointer; } nav button.active { background: #ffffffa6; box-shadow: 0 5px 18px #6b91ad17, inset 2px 0 #65c5ee; color: #315b78; } .icon { color: #68a9ce; font-size: 18px; } nav small { display: block; margin-top: 3px; color: #8da2b1; font-size: 11px; }
    main { max-width: 940px; width: 100%; padding: 57px 64px; } .eyebrow { color: #669ec0; font-size: 11px; font-weight: 800; letter-spacing: .13em; } h1 { margin: 8px 0 8px; font-size: clamp(29px,4vw,40px); letter-spacing: -.06em; } .lead { margin: 0; color: #718c9f; font-size: 15px; }
    .stack { display: grid; gap: 14px; margin-top: 31px; } .card { border: 1px solid #ffffffb8; border-radius: 20px; background: #ffffff82; box-shadow: 0 16px 38px #537c9815, inset 0 1px #fff; backdrop-filter: blur(20px) saturate(135%); }
    .preference { display: grid; grid-template-columns: minmax(210px,1fr) 345px; gap: 34px; padding: 25px 28px; align-items: center; } h2 { margin: 0 0 7px; font-size: 17px; } .desc { margin: 0; color: #7892a4; line-height: 1.65; } .rows { display: grid; } .row { display:flex; justify-content:space-between; gap: 18px; align-items:center; padding: 11px 0; border-bottom: 1px solid #bdd5e24a; } .row:last-child { border:0; } .row b { display:block; font-size:14px; } .row small { color:#829aaa; font-size:12px; } .switch { width:42px; height:25px; border-radius:99px; padding:3px; background:#7ec7e8; box-shadow:inset 0 1px #ffffff73; } .switch i { display:block; width:19px; height:19px; margin-left:auto; border-radius:50%; background:#fff; box-shadow:0 2px 5px #49779036; }
    .simple { padding: 23px 28px; } .speed { display:flex; justify-content:space-between; align-items:center; margin-bottom:21px; } .speed b { font-size:17px; } .speed span { color:#5a94b8; font-weight:700; } .range { height:7px; border-radius:99px; background:#d2e7f1; } .range::before { display:block; width:50%; height:100%; border-radius:inherit; background:#79c4e7; content:""; } .bubble { display:grid; grid-template-columns:1fr auto; gap:10px; } input { min-width:0; border:1px solid #bfd8e5; border-radius:11px; padding:13px; background:#ffffffa3; color:#49677e; font:inherit; } .send { border:1px solid #b4d7e9; border-radius:11px; padding:0 20px; background:#e4f4fb; color:#3c789b; font:inherit; font-weight:700; }
    @media (max-width:700px){ .app{grid-template-columns:1fr;grid-template-rows:48px auto 1fr}.titlebar{padding-left:86px}.brand{display:none} aside{grid-row:2;padding:9px 12px;border-right:0;border-bottom:1px solid #fff9} nav{grid-template-columns:repeat(3,1fr)} nav button{display:block;text-align:center;padding:9px 2px}.icon,nav small{display:none} main{grid-row:3;padding:34px 22px}.preference{grid-template-columns:1fr;padding:22px}.bubble{grid-template-columns:1fr}.send{height:44px} }
  </style>
</head>
<body><div class="app"><header class="titlebar">AI-Pets 设置</header><aside><div class="brand"><span class="mark">AI</span><span><b>AI-Pets</b><small>桌面陪伴控制台</small></span></div><nav><button class="active"><span class="icon">◎</span><span><b>基础设置</b><small>显示与交互</small></span></button><button><span class="icon">✦</span><span><b>宠物包</b><small>形象与资源</small></span></button><button><span class="icon">⌁</span><span><b>测试工具</b><small>动作与事件</small></span></button></nav></aside><main><div class="eyebrow">PREFERENCES</div><h1>基础设置</h1><p class="lead">调校桌面伙伴的显示和互动方式。</p><div class="stack"><section class="card preference"><div><h2>宠物窗口</h2><p class="desc">控制桌面宠物是否显示，以及是否保持在其他窗口上方。</p></div><div class="rows"><div class="row"><span><b>显示宠物</b><small>暂时隐藏或显示桌面伙伴</small></span><span class="switch"><i></i></span></div><div class="row"><span><b>窗口置顶</b><small>始终停留在工作窗口上方</small></span><span class="switch"><i></i></span></div></div></section><section class="card simple"><div class="speed"><b>播放速度</b><span>1.00x</span></div><div class="range"></div></section><section class="card simple"><h2>气泡文本</h2><div class="bubble"><input value="你好，我是 AI 宠物。"><button class="send">发送</button></div></section></div></main></div></body></html>
