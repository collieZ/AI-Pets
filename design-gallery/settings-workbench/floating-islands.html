<!doctype html>
<html lang="zh-CN"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>冰晶工作台 - 浮岛导航</title><style>
  :root{font-family:"PingFang SC","Hiragino Sans GB",sans-serif;color:#23445e}*{box-sizing:border-box}body{margin:0;min-width:320px;background:#d6edf5}.app{min-height:100vh;padding:18px;background:radial-gradient(circle at 15% 85%,#afe2ee8f,transparent 31%),radial-gradient(circle at 83% 7%,#fff8,transparent 23%),linear-gradient(130deg,#d7eef4,#c1dce9)}.shell{display:grid;grid-template-columns:186px minmax(0,1fr);min-height:calc(100vh - 36px);border:1px solid #fff9;border-radius:27px;background:#ffffff4d;box-shadow:0 22px 55px #31577422,inset 0 1px #fff;backdrop-filter:blur(30px) saturate(140%);overflow:hidden}.rail{padding:23px 13px;border-right:1px solid #ffffff9c}.traffic{height:26px;margin:0 4px 30px;display:flex;gap:8px;align-items:center}.traffic i{width:11px;height:11px;border-radius:50%;background:#ff796d}.traffic i:nth-child(2){background:#ffd162}.traffic i:nth-child(3){background:#5fd48b}.pet{margin:0 8px 24px;padding:14px 12px;border-radius:17px;background:#ffffff87}.pet span{display:block;color:#6593af;font-size:11px;letter-spacing:.12em}.pet b{display:block;margin-top:6px;font-size:16px}nav{display:grid;gap:5px}nav button{border:0;border-radius:13px;padding:12px;text-align:left;background:transparent;color:#668295;font:inherit;cursor:pointer}nav button.active{background:#eaf8fcbd;color:#356889;box-shadow:inset 0 0 0 1px #b9e2ee}.content{padding:48px clamp(30px,7vw,90px);max-width:1050px}.top{display:flex;justify-content:space-between;align-items:end;margin-bottom:29px}.crumb{color:#619fbc;font-size:12px;font-weight:800;letter-spacing:.13em}h1{margin:7px 0 0;font-size:39px;letter-spacing:-.07em}.hint{max-width:230px;margin:0;color:#7793a5;font-size:13px;line-height:1.6}.grid{display:grid;gap:15px}.module{padding:25px;border:1px solid #fff;background:#ffffff72;border-radius:21px;box-shadow:0 13px 32px #4d779316;backdrop-filter:blur(17px)}.module-head{display:flex;justify-content:space-between;align-items:center;gap:20px}.module h2{margin:0;font-size:16px}.module p{margin:6px 0 0;color:#7896a8;line-height:1.6}.status{display:grid;gap:2px;min-width:120px;padding-left:18px;border-left:1px solid #c5e1eb}.status b{font-size:13px}.status small{color:#87a1b0}.toggle{justify-self:end;width:40px;height:23px;padding:3px;border-radius:99px;background:#70c4e5}.toggle i{display:block;width:17px;height:17px;margin-left:auto;border-radius:50%;background:#fff}.speed{display:grid;grid-template-columns:auto 1fr;gap:22px;align-items:center}.speed strong{font-size:24px;color:#4f87a6}.line{height:6px;border-radius:9px;background:#d2e8f1}.line:before{display:block;width:50%;height:100%;border-radius:inherit;background:#72c4e5;content:""}.bubble{display:grid;grid-template-columns:1fr auto;gap:10px}input,button.send{font:inherit;border-radius:11px}input{border:1px solid #bedde8;background:#ffffffa5;padding:12px;color:#527188}button.send{border:1px solid #b4dae9;background:#e6f6fb;color:#397a9e;padding:0 20px;font-weight:700}@media(max-width:700px){.app{padding:0}.shell{grid-template-columns:1fr;border-radius:0;min-height:100vh}.rail{border-right:0;border-bottom:1px solid #ffffff9c;padding:13px}.traffic,.pet{display:none}nav{grid-template-columns:repeat(3,1fr)}nav button{text-align:center;padding:9px 2px}.content{padding:34px 22px}.top{display:block}.hint{margin-top:10px}.module-head,.speed{grid-template-columns:1fr}.status{border-left:0;border-top:1px solid #c5e1eb;padding:12px 0 0}.toggle{justify-self:start}.bubble{grid-template-columns:1fr}button.send{height:44px}}
</style></head><body><div class="app"><div class="shell"><aside class="rail"><div class="traffic"><i></i><i></i><i></i></div><div class="pet"><span>AI-PETS</span><b>控制台</b></div><nav><button class="active">基础设置</button><button>宠物包</button><button>测试工具</button></nav></aside><main class="content"><div class="top"><div><div class="crumb">桌面陪伴 · 设置</div><h1>基础设置</h1></div><p class="hint">更少干扰，更安心地陪伴在桌面一角。</p></div><div class="grid"><section class="module"><div class="module-head"><div><h2>桌面显示</h2><p>让宠物以合适的方式陪伴你的工作。</p></div><div class="toggle"><i></i></div></div><div class="status"><b>显示宠物</b><small>正在桌面显示</small></div></section><section class="module"><div class="module-head"><div><h2>保持在最前</h2><p>宠物始终停留在其他窗口上方。</p></div><div class="toggle"><i></i></div></div><div class="status"><b>窗口置顶</b><small>已启用</small></div></section><section class="module speed"><strong>1.00x</strong><div><h2>播放速度</h2><p>控制动作的播放节奏。</p><div class="line"></div></div></section><section class="module"><h2>气泡文本</h2><p>向宠物发送一段即时消息。</p><div class="bubble"><input value="你好，我是 AI 宠物。"><button class="send">发送</button></div></section></div></main></div></div></body></html>
