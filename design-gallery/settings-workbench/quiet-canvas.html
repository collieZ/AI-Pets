<!doctype html>
<html lang="zh-CN"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>冰晶工作台 - 静谧画布</title><style>
  :root{font-family:"PingFang SC","Hiragino Sans GB",sans-serif;color:#29445b}*{box-sizing:border-box}body{margin:0;min-width:320px;background:#e8f4f7}.app{min-height:100vh;display:grid;grid-template-columns:160px minmax(0,760px);grid-template-rows:54px 1fr;gap:0;background:radial-gradient(circle at 80% 13%,#ffffffb3,transparent 26%),linear-gradient(135deg,#edf7f8,#d9edf3)}.bar{grid-column:1/-1;display:flex;align-items:center;padding-left:90px;border-bottom:1px solid #b8d7e34f;color:#7593a5;font-size:13px;font-weight:600;letter-spacing:.03em;background:#ffffff36;backdrop-filter:blur(30px)}aside{padding:35px 16px;border-right:1px solid #b8d7e34f}aside b{display:block;margin:0 10px 22px;color:#5b798e;font-size:12px;letter-spacing:.12em}nav{display:grid;gap:8px}nav button{padding:11px 10px;border:0;border-radius:9px;background:transparent;color:#7996a8;text-align:left;font:inherit;cursor:pointer}nav button.active{background:#fff9;color:#3f6d88;box-shadow:0 5px 16px #557c9510}main{padding:58px 60px 80px}.meta{color:#72a9c3;font-size:11px;font-weight:800;letter-spacing:.14em}h1{margin:9px 0 4px;font-size:38px;letter-spacing:-.07em}.intro{margin:0 0 38px;color:#7b96a7}.section{padding:0 0 29px;margin-bottom:29px;border-bottom:1px solid #b8d7e373}.section:last-child{border:0}.section-top{display:flex;justify-content:space-between;gap:20px;align-items:start}.section h2{margin:0 0 7px;font-size:17px}.section p{margin:0;color:#7c98a9;font-size:14px;line-height:1.65}.controls{display:grid;gap:8px;min-width:218px}.control{display:flex;justify-content:space-between;align-items:center;padding:9px 0}.control b{font-size:14px}.switch{width:40px;height:23px;padding:3px;border-radius:99px;background:#82c9e6}.switch i{display:block;width:17px;height:17px;margin-left:auto;border-radius:50%;background:#fff}.speed{display:flex;align-items:center;gap:21px}.speed strong{color:#4b8eb0;font-size:23px}.track{flex:1;height:5px;border-radius:99px;background:#cee4ed}.track:before{display:block;width:50%;height:100%;border-radius:inherit;background:#7bc3e4;content:""}.bubble{display:grid;grid-template-columns:1fr auto;gap:10px;margin-top:15px}input,button{font:inherit}input{min-width:0;padding:12px;border:1px solid #bed8e5;border-radius:10px;background:#fff8;color:#587489}button.send{border:0;border-radius:10px;padding:0 19px;background:#dff2f8;color:#397896;font-weight:700}@media(max-width:650px){.app{grid-template-columns:1fr;grid-template-rows:54px auto 1fr}.bar{padding-left:88px}aside{padding:10px 16px;border-right:0;border-bottom:1px solid #b8d7e34f}aside b{display:none}nav{grid-template-columns:repeat(3,1fr)}nav button{text-align:center;padding:8px 2px}main{padding:38px 23px}.section-top{display:block}.controls{margin-top:18px}.speed{display:grid;grid-template-columns:1fr}.bubble{grid-template-columns:1fr}button.send{height:44px}}
</style></head><body><div class="app"><header class="bar">AI-Pets 设置</header><aside><b>AI-PETS</b><nav><button class="active">基础设置</button><button>宠物包</button><button>测试工具</button></nav></aside><main><div class="meta">WORKSPACE</div><h1>基础设置</h1><p class="intro">让辛巴以恰到好处的方式陪伴你。</p><section class="section"><div class="section-top"><div><h2>桌面显示</h2><p>控制宠物是否显示，以及它是否保持在窗口上方。</p></div><div class="controls"><div class="control"><b>显示宠物</b><span class="switch"><i></i></span></div><div class="control"><b>窗口置顶</b><span class="switch"><i></i></span></div></div></div></section><section class="section"><h2>播放速度</h2><p>动作节奏会跟随这个设定。</p><div class="speed"><strong>1.00x</strong><div class="track"></div></div></section><section class="section"><h2>气泡文本</h2><p>给宠物一段想说的话。</p><div class="bubble"><input value="你好，我是 AI 宠物。"><button class="send">发送</button></div></section></main></div></body></html>
